<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OX 遊戲</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;700&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --o-color: #ff6b35;
    --x-color: #00d4ff;
    --text: #e8e8e8;
    --muted: #555;
    --win-glow: #ffd700;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    animation: grid-shift 20s linear infinite;
  }

  @keyframes grid-shift {
    from { background-position: 0 0; }
    to { background-position: 40px 40px; }
  }

  #ambient {
    position: fixed;
    width: 700px; height: 700px;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: background 1.2s ease;
    background: radial-gradient(circle, rgba(255,107,53,0.07) 0%, transparent 70%);
  }

  #particle-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    animation: container-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes container-in {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header { text-align: center; }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 72px);
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, var(--o-color) 0%, var(--x-color) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    filter: drop-shadow(0 0 20px rgba(255,107,53,0.3));
  }

  .subtitle {
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .scoreboard {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .score-item {
    padding: 12px 28px;
    text-align: center;
    position: relative;
    transition: background 0.3s;
  }

  .score-item.active-turn { background: rgba(255,255,255,0.03); }

  .score-item:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0; top: 20%; height: 60%;
    width: 1px;
    background: var(--border);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .score-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    line-height: 1.1;
  }

  .score-value.bump {
    animation: score-bump 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes score-bump {
    0% { transform: scale(1); }
    40% { transform: scale(1.6); }
    100% { transform: scale(1); }
  }

  .score-item.player .score-value { color: var(--o-color); }
  .score-item.ai .score-value { color: var(--x-color); }
  .score-item.draw .score-value { color: var(--text); }

  .status {
    height: 32px;
    font-size: 14px;
    letter-spacing: 0.1em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--o-color);
    animation: pulse 1.5s ease-in-out infinite;
    box-shadow: 0 0 6px var(--o-color);
  }

  .status-dot.ai {
    background: var(--x-color);
    box-shadow: 0 0 6px var(--x-color);
    animation: pulse-ai 1.5s ease-in-out infinite;
  }

  .status-dot.hidden { opacity: 0; animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.6); }
  }

  @keyframes pulse-ai {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.6); }
  }

  .difficulty {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .diff-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 4px;
  }

  .diff-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .diff-btn:hover { border-color: var(--text); color: var(--text); }
  .diff-btn.active { border-color: var(--o-color); color: var(--o-color); background: rgba(255,107,53,0.1); }

  .board-wrap { position: relative; }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    transition: box-shadow 0.5s;
  }

  .board.shake {
    animation: board-shake 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97);
  }

  @keyframes board-shake {
    0%, 100% { transform: translateX(0) rotate(0); }
    15% { transform: translateX(-7px) rotate(-1.5deg); }
    30% { transform: translateX(7px) rotate(1.5deg); }
    45% { transform: translateX(-5px) rotate(-0.8deg); }
    60% { transform: translateX(5px) rotate(0.8deg); }
    75% { transform: translateX(-3px); }
    90% { transform: translateX(3px); }
  }

  .board.win-glow-board {
    box-shadow: 0 0 40px rgba(255,215,0,0.2), 0 0 80px rgba(255,215,0,0.08);
  }

  .cell {
    width: clamp(90px, 22vw, 110px);
    height: clamp(90px, 22vw, 110px);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(44px, 11vw, 56px);
    transition: background 0.15s, border-color 0.2s, transform 0.12s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    user-select: none;
    animation: cell-appear 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes cell-appear {
    from { opacity: 0; transform: scale(0.75); }
    to { opacity: 1; transform: scale(1); }
  }

  .cell .ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    animation: ripple-expand 0.55s ease-out forwards;
    pointer-events: none;
  }

  @keyframes ripple-expand {
    to { transform: scale(4.5); opacity: 0; }
  }

  .cell::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
  }

  .cell:hover:not(.taken):not(.disabled) {
    border-color: #444;
    transform: scale(0.96);
  }

  .cell:hover:not(.taken):not(.disabled)::before { opacity: 1; }

  /* Ghost preview */
  .cell:hover:not(.taken):not(.disabled)::after {
    content: 'O';
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(44px, 11vw, 56px);
    color: rgba(255,107,53,0.13);
    line-height: 1;
    pointer-events: none;
    animation: ghost-in 0.15s ease-out;
  }

  @keyframes ghost-in {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
  }

  .cell:active:not(.taken):not(.disabled) { transform: scale(0.9); }
  .cell.taken { cursor: default; }
  .cell.disabled { cursor: not-allowed; }

  .cell .mark {
    display: inline-block;
    animation: mark-pop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    line-height: 1;
    position: relative;
    z-index: 1;
  }

  .cell .mark.O {
    color: var(--o-color);
    text-shadow: 0 0 20px rgba(255,107,53,0.7), 0 0 40px rgba(255,107,53,0.3);
  }

  .cell .mark.X {
    color: var(--x-color);
    text-shadow: 0 0 20px rgba(0,212,255,0.7), 0 0 40px rgba(0,212,255,0.3);
  }

  @keyframes mark-pop {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    60% { transform: scale(1.25) rotate(6deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .cell .mark.X.ai-placed {
    animation: mark-ai 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes mark-ai {
    0% { transform: scale(2.2) rotate(25deg); opacity: 0; filter: blur(10px); }
    100% { transform: scale(1) rotate(0); opacity: 1; filter: blur(0); }
  }

  .cell.winner {
    border-color: var(--win-glow) !important;
    background: rgba(255,215,0,0.05) !important;
    animation: winner-pulse 0.9s ease-in-out infinite alternate;
  }

  @keyframes winner-pulse {
    from { box-shadow: 0 0 8px rgba(255,215,0,0.3); }
    to { box-shadow: 0 0 28px rgba(255,215,0,0.7), inset 0 0 18px rgba(255,215,0,0.08); }
  }

  .win-line {
    position: absolute;
    background: linear-gradient(90deg, transparent 0%, var(--win-glow) 30%, var(--win-glow) 70%, transparent 100%);
    border-radius: 4px;
    transform-origin: left center;
    animation: draw-line 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    pointer-events: none;
    z-index: 10;
    box-shadow: 0 0 16px var(--win-glow), 0 0 32px rgba(255,215,0,0.4);
  }

  @keyframes draw-line {
    from { transform: scaleX(0); opacity: 0; }
    to { transform: scaleX(1); opacity: 1; }
  }

  .result-overlay {
    position: absolute;
    inset: 0;
    background: rgba(13,13,13,0.9);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
    z-index: 20;
    backdrop-filter: blur(6px);
  }

  .result-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .result-emoji {
    font-size: 38px;
    animation: result-drop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.1s both;
  }

  .result-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    letter-spacing: 0.1em;
    animation: result-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
    line-height: 1;
  }

  .result-text.win { color: var(--o-color); text-shadow: 0 0 30px rgba(255,107,53,0.6); }
  .result-text.lose { color: var(--x-color); text-shadow: 0 0 30px rgba(0,212,255,0.6); }
  .result-text.draw { color: #aaa; }

  .result-sub {
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    animation: result-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both;
  }

  @keyframes result-drop {
    from { transform: scale(0) translateY(-20px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  @keyframes result-pop {
    from { transform: scale(0.4) translateY(15px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  .btn-row { display: flex; gap: 12px; }

  .btn {
    padding: 10px 28px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover { border-color: #555; background: #222; }
  .btn:active { transform: scale(0.96); }

  .btn.primary {
    border-color: var(--o-color);
    color: var(--o-color);
    background: rgba(255,107,53,0.08);
  }

  .btn.primary:hover { background: rgba(255,107,53,0.18); }

  .mute-btn {
    position: fixed;
    top: 16px; right: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 18px;
    z-index: 200;
    transition: all 0.2s;
    line-height: 1;
  }

  .mute-btn:hover { color: var(--text); border-color: #555; }

  .role-info {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-align: center;
    text-transform: uppercase;
  }

  .role-info span { color: var(--o-color); }

  .thinking-dots span {
    display: inline-block;
    animation: dot-bounce 1.2s ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
    40% { transform: translateY(-5px); opacity: 1; }
  }
</style>
</head>
<body>

<div id="ambient"></div>
<canvas id="particle-canvas"></canvas>
<button class="mute-btn" id="mute-btn" onclick="toggleMute()" title="音效開關">🔊</button>

<div class="container">
  <div class="header">
    <div class="title">OX GAME</div>
    <div class="subtitle">Human vs Machine</div>
  </div>

  <div class="scoreboard">
    <div class="score-item player" id="score-item-player">
      <div class="score-label">你 (O)</div>
      <div class="score-value" id="score-player">0</div>
    </div>
    <div class="score-item draw">
      <div class="score-label">平局</div>
      <div class="score-value" id="score-draw">0</div>
    </div>
    <div class="score-item ai" id="score-item-ai">
      <div class="score-label">電腦 (X)</div>
      <div class="score-value" id="score-ai">0</div>
    </div>
  </div>

  <div class="difficulty">
    <span class="diff-label">難度</span>
    <button class="diff-btn" data-level="easy" onclick="setDifficulty('easy')">簡單</button>
    <button class="diff-btn active" data-level="medium" onclick="setDifficulty('medium')">普通</button>
    <button class="diff-btn" data-level="hard" onclick="setDifficulty('hard')">困難</button>
  </div>

  <div class="status" id="status">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">輪到你了</span>
  </div>

  <div class="board-wrap" id="board-wrap">
    <div class="board" id="board"></div>
    <div class="result-overlay" id="result-overlay">
      <div class="result-emoji" id="result-emoji"></div>
      <div class="result-text" id="result-text"></div>
      <div class="result-sub" id="result-sub"></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn primary" onclick="resetGame()">再玩一局</button>
    <button class="btn" onclick="resetScore()">重置分數</button>
  </div>

  <div class="role-info">你是 <span>O（先手）</span>，電腦是 X</div>
</div>

<script>
// ── State ──────────────────────────────────────────────────
let board = Array(9).fill(null);
let gameOver = false;
let difficulty = 'medium';
let scores = { player: 0, ai: 0, draw: 0 };
let muted = false;

const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

// ── Audio (Web Audio API) ─────────────────────────────────
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function tone(freq, type, dur, vol = 0.25, startDelay = 0, freqEnd = null) {
  if (muted) return;
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + startDelay);
    if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, ctx.currentTime + startDelay + dur * 0.8);
    gain.gain.setValueAtTime(0, ctx.currentTime + startDelay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + startDelay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startDelay + dur);
    osc.start(ctx.currentTime + startDelay);
    osc.stop(ctx.currentTime + startDelay + dur + 0.01);
  } catch(e) {}
}

const sounds = {
  placeO() {
    tone(523, 'sine', 0.12, 0.2);
    tone(784, 'sine', 0.08, 0.08, 0.04);
  },
  placeX() {
    tone(200, 'square', 0.1, 0.12);
    tone(150, 'sawtooth', 0.07, 0.07, 0.03);
  },
  hover() {
    tone(880, 'sine', 0.04, 0.03);
  },
  win() {
    // Rising fanfare
    [523, 659, 784, 1047, 1319].forEach((f, i) => tone(f, 'sine', 0.25, 0.2, i * 0.09));
    tone(1047, 'sine', 0.5, 0.18, 0.5);
    tone(1319, 'sine', 0.5, 0.15, 0.52);
    tone(1568, 'sine', 0.5, 0.12, 0.54);
  },
  lose() {
    // Descending sad tones
    [400, 330, 260, 200].forEach((f, i) => tone(f, 'sawtooth', 0.2, 0.15, i * 0.1));
  },
  draw() {
    tone(440, 'triangle', 0.25, 0.18);
    tone(440, 'triangle', 0.25, 0.14, 0.3);
  },
  click() {
    tone(900, 'sine', 0.05, 0.08);
  },
  think() {
    tone(350, 'triangle', 0.07, 0.05);
  }
};

function toggleMute() {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
  if (!muted) sounds.click();
}

// ── Particles ────────────────────────────────────────────
const canvas = document.getElementById('particle-canvas');
const pctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.color = color;
    this.vx = (Math.random() - 0.5) * 9;
    this.vy = (Math.random() - 0.5) * 9 - 4;
    this.size = Math.random() * 6 + 2;
    this.shape = Math.random() > 0.6 ? 'star' : 'circle';
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.25;
    this.life = 1;
    this.decay = Math.random() * 0.02 + 0.012;
    this.gravity = 0.18;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += this.gravity; this.vx *= 0.98;
    this.life -= this.decay;
    this.rotation += this.rotSpeed;
  }
  draw(c) {
    c.save();
    c.globalAlpha = Math.max(0, this.life);
    c.translate(this.x, this.y);
    c.rotate(this.rotation);
    c.fillStyle = this.color;
    if (this.shape === 'circle') {
      c.beginPath(); c.arc(0, 0, this.size, 0, Math.PI * 2); c.fill();
    } else {
      c.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
        const r = i === 0 ? this.size : this.size * 0.45;
        i === 0 ? c.moveTo(Math.cos(a)*r, Math.sin(a)*r) : c.lineTo(Math.cos(a)*r, Math.sin(a)*r);
      }
      c.closePath(); c.fill();
    }
    c.restore();
  }
}

function burst(x, y, color, n = 14) {
  for (let i = 0; i < n; i++) particles.push(new Particle(x, y, color));
}

function celebrate() {
  const colors = ['#ffd700','#ff6b35','#00d4ff','#ff4488','#44ff88','#cc44ff','#ffff44'];
  for (let i = 0; i < 10; i++) {
    setTimeout(() => {
      const x = Math.random() * window.innerWidth;
      const y = Math.random() * window.innerHeight * 0.5;
      burst(x, y, colors[Math.floor(Math.random() * colors.length)], 18);
    }, i * 130);
  }
}

function loopParticles() {
  pctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.update(); p.draw(pctx); });
  requestAnimationFrame(loopParticles);
}
loopParticles();

// ── Ambient ───────────────────────────────────────────────
function setAmbient(type) {
  const el = document.getElementById('ambient');
  const map = {
    player: 'rgba(255,107,53,0.08)',
    ai: 'rgba(0,212,255,0.08)',
    win: 'rgba(255,215,0,0.12)',
    neutral: 'rgba(80,80,80,0.04)'
  };
  const c = map[type] || map.neutral;
  el.style.background = `radial-gradient(circle, ${c} 0%, transparent 70%)`;
}

// ── Game ──────────────────────────────────────────────────
function setDifficulty(level) {
  difficulty = level;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b.dataset.level === level));
  sounds.click();
  resetGame();
}

function initBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.index = i;
    cell.style.animationDelay = `${i * 0.045}s`;
    cell.onclick = () => playerMove(i);
    cell.onmouseenter = () => { if (!gameOver && !board[i]) sounds.hover(); };
    boardEl.appendChild(cell);
  }
  setAmbient('player');
}

function renderMark(index, isNewAI = false) {
  const cells = document.querySelectorAll('.cell');
  const cell = cells[index];
  cell.innerHTML = '';
  cell.classList.add('taken');

  const mark = document.createElement('span');
  mark.className = `mark ${board[index]}${isNewAI ? ' ai-placed' : ''}`;
  mark.textContent = board[index];
  cell.appendChild(mark);

  // Ripple
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  const c = board[index] === 'O' ? 'rgba(255,107,53,0.35)' : 'rgba(0,212,255,0.35)';
  ripple.style.cssText = `width:120px;height:120px;left:-15px;top:-15px;background:${c};`;
  cell.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  // Particle burst from cell
  const rect = cell.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  burst(cx, cy, board[index] === 'O' ? '#ff6b35' : '#00d4ff', 10);
}

function setStatus(text, side = 'player', thinking = false) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  if (thinking) {
    txt.innerHTML = `電腦思考中<span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>`;
  } else {
    txt.textContent = text;
  }
  dot.className = `status-dot ${side === 'ai' ? 'ai' : side === 'hidden' ? 'hidden' : ''}`;
  document.getElementById('score-item-player').classList.toggle('active-turn', side === 'player');
  document.getElementById('score-item-ai').classList.toggle('active-turn', side === 'ai');
}

function checkWinner(b) {
  for (const [a, c, d] of WINS) {
    if (b[a] && b[a] === b[c] && b[a] === b[d]) return { winner: b[a], line: [a, c, d] };
  }
  if (b.every(v => v)) return { winner: 'draw', line: [] };
  return null;
}

function playerMove(i) {
  if (gameOver || board[i]) return;
  board[i] = 'O';
  renderMark(i, false);
  sounds.placeO();

  const result = checkWinner(board);
  if (result) { endGame(result); return; }

  setStatus('', 'ai', true);
  setAmbient('ai');
  document.querySelectorAll('.cell').forEach(c => c.classList.add('disabled'));

  const delay = difficulty === 'easy' ? 420 : difficulty === 'medium' ? 620 : 850;
  setTimeout(() => sounds.think(), delay / 3);

  setTimeout(() => {
    const move = getAIMove();
    board[move] = 'X';
    renderMark(move, true);
    sounds.placeX();
    document.querySelectorAll('.cell').forEach(c => c.classList.remove('disabled'));

    const r2 = checkWinner(board);
    if (r2) { endGame(r2); return; }

    setStatus('輪到你了', 'player');
    setAmbient('player');
  }, delay);
}

function getAIMove() {
  if (difficulty === 'easy') return getEasyMove();
  if (difficulty === 'medium') return Math.random() < 0.7 ? getBestMove() : getRandomMove();
  return getBestMove();
}

function getRandomMove() {
  const empty = board.map((v,i) => v ? null : i).filter(v => v !== null);
  return empty[Math.floor(Math.random() * empty.length)];
}

function getEasyMove() {
  for (const [a,b,c] of WINS) {
    const line = [board[a],board[b],board[c]];
    if (line.filter(v=>v==='O').length === 2 && line.includes(null))
      return [a,b,c][line.indexOf(null)];
  }
  return getRandomMove();
}

function getBestMove() {
  let best = -Infinity, bestMove = -1;
  for (let i = 0; i < 9; i++) {
    if (!board[i]) {
      board[i] = 'X';
      const s = minimax(board, 0, false);
      board[i] = null;
      if (s > best) { best = s; bestMove = i; }
    }
  }
  return bestMove;
}

function minimax(b, depth, isMax) {
  const r = checkWinner(b);
  if (r) { if (r.winner==='X') return 10-depth; if (r.winner==='O') return depth-10; return 0; }
  if (isMax) {
    let best = -Infinity;
    for (let i=0;i<9;i++) { if(!b[i]){b[i]='X';best=Math.max(best,minimax(b,depth+1,false));b[i]=null;} }
    return best;
  } else {
    let best = Infinity;
    for (let i=0;i<9;i++) { if(!b[i]){b[i]='O';best=Math.min(best,minimax(b,depth+1,true));b[i]=null;} }
    return best;
  }
}

function endGame(result) {
  gameOver = true;
  const overlay = document.getElementById('result-overlay');
  const txt = document.getElementById('result-text');
  const sub = document.getElementById('result-sub');
  const emo = document.getElementById('result-emoji');
  setStatus('', 'hidden');

  if (result.winner === 'O') {
    scores.player++;
    txt.textContent = '你贏了！'; txt.className = 'result-text win';
    sub.textContent = 'Excellent!'; emo.textContent = '🏆';
    setAmbient('win');
    drawWinLine(result.line);
    setTimeout(() => { sounds.win(); celebrate(); }, 350);
  } else if (result.winner === 'X') {
    scores.ai++;
    txt.textContent = '電腦贏了'; txt.className = 'result-text lose';
    sub.textContent = 'Try again!'; emo.textContent = '🤖';
    setAmbient('ai');
    drawWinLine(result.line);
    const bd = document.getElementById('board');
    bd.classList.add('shake');
    setTimeout(() => bd.classList.remove('shake'), 500);
    setTimeout(() => sounds.lose(), 250);
  } else {
    scores.draw++;
    txt.textContent = '平局'; txt.className = 'result-text draw';
    sub.textContent = 'Nobody wins!'; emo.textContent = '🤝';
    setAmbient('neutral');
    setTimeout(() => sounds.draw(), 150);
  }

  // Score bump
  updateScores();
  const bumpMap = { O: 'score-player', X: 'score-ai', draw: 'score-draw' };
  const bumpEl = document.getElementById(bumpMap[result.winner] || 'score-draw');
  bumpEl.classList.remove('bump');
  void bumpEl.offsetWidth;
  bumpEl.classList.add('bump');

  setTimeout(() => overlay.classList.add('show'), result.winner !== 'draw' ? 650 : 300);
}

function drawWinLine(line) {
  if (!line || line.length < 2) return;
  line.forEach(i => document.querySelectorAll('.cell')[i].classList.add('winner'));
  document.getElementById('board').classList.add('win-glow-board');

  const wrap = document.getElementById('board-wrap');
  const cells = document.querySelectorAll('.cell');
  const c0 = cells[line[0]].getBoundingClientRect();
  const c2 = cells[line[2]].getBoundingClientRect();
  const wr = wrap.getBoundingClientRect();

  const x1 = c0.left - wr.left + c0.width / 2;
  const y1 = c0.top - wr.top + c0.height / 2;
  const x2 = c2.left - wr.left + c2.width / 2;
  const y2 = c2.top - wr.top + c2.height / 2;

  const len = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
  const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;

  const lineEl = document.createElement('div');
  lineEl.className = 'win-line';
  lineEl.style.cssText = `width:${len}px;height:5px;left:${x1}px;top:${y1-2.5}px;transform:rotate(${angle}deg);transform-origin:0 50%;`;
  wrap.appendChild(lineEl);
}

function updateScores() {
  document.getElementById('score-player').textContent = scores.player;
  document.getElementById('score-ai').textContent = scores.ai;
  document.getElementById('score-draw').textContent = scores.draw;
}

function resetGame() {
  board = Array(9).fill(null);
  gameOver = false;
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('board').classList.remove('win-glow-board', 'shake');
  document.querySelectorAll('.win-line').forEach(e => e.remove());
  initBoard();
  setStatus('輪到你了', 'player');
}

function resetScore() {
  scores = { player: 0, ai: 0, draw: 0 };
  updateScores();
  sounds.click();
  resetGame();
}

// Init
initBoard();
</script>
